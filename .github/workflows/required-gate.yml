name: velocity-required-gate

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Contract check
        run: npm run contract:check
      - name: Test
        run: npm test

  bench-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Bench CI
        run: npm run bench:ci

  bench-certify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Bench certification
        run: npm run bench:certify

  package-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        run: npm ci
      - name: Package smoke
        run: npm run package:smoke

  perf-bakeoff:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Bakeoff
        run: npm run perf:bakeoff

  autobahn:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Autobahn testsuite
        run: pip install autobahntestsuite
      - name: Patch Autobahn testsuite version module
        run: |
          python - <<'PY'
          import site
          from pathlib import Path
          patched = []
          for base in site.getsitepackages():
            path = Path(base) / "_version.py"
            if not path.exists():
              path.write_text("__version__ = '0.0.0'\\n", encoding="utf-8")
            patched.append(str(path))
          print("patched:", ",".join(patched))
          PY
      - name: Start target
        run: node scripts/autobahn-target.mjs &
      - name: Run Autobahn
        run: wstest -m fuzzingclient -s ci/autobahn/fuzzingclient.json

  k6-load:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        run: npm ci
      - name: Start target
        run: K6_WS_PORT=9191 node scripts/k6-ws-target.mjs &
      - name: Setup k6
        uses: grafana/setup-k6-action@v1
      - name: Run k6 websocket load
        run: K6_WS_TARGET=ws://127.0.0.1:9191 k6 run ci/k6/ws-load.js

  toxiproxy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        run: npm ci
      - name: Start Toxiproxy
        run: docker run -d --rm --name toxiproxy -p 8474:8474 -p 8666:8666 shopify/toxiproxy
      - name: Toxiproxy smoke
        run: npm run toxiproxy:smoke
      - name: Stop Toxiproxy
        if: always()
        run: docker stop toxiproxy

  gate:
    runs-on: ubuntu-latest
    needs: [lint-test, bench-ci, bench-certify, package-smoke, perf-bakeoff, autobahn, k6-load, toxiproxy]
    if: always()
    steps:
      - name: Enforce required checks
        run: |
          if [ "${{ needs.lint-test.result }}" != "success" ] || \
             [ "${{ needs.bench-ci.result }}" != "success" ] || \
             [ "${{ needs.bench-certify.result }}" != "success" ] || \
             [ "${{ needs.package-smoke.result }}" != "success" ] || \
             [ "${{ needs.perf-bakeoff.result }}" != "success" ] || \
             [ "${{ needs.autobahn.result }}" != "success" ] || \
             [ "${{ needs.k6-load.result }}" != "success" ] || \
             [ "${{ needs.toxiproxy.result }}" != "success" ]; then
            echo "One or more required checks failed"
            exit 1
          fi
          echo "All required checks passed"
