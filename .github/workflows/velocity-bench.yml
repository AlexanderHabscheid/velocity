name: velocity-bench

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bench CI
        run: npm run bench:ci

      - name: Upload Bench Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: velocity-bench-reports
          path: .velocity/bench-reports
