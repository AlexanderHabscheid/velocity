name: velocity-perf-bakeoff

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  bakeoff:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: ws vs uWebSockets.js bakeoff
        run: npm run perf:bakeoff
