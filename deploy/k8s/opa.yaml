apiVersion: v1
kind: ConfigMap
metadata:
  name: velocity-opa-policy
  namespace: velocity
data:
  policy.rego: |
    package velocity

    default allow = {"allow": false, "rateLimitRps": 1}

    allow = {"allow": can_access, "rateLimitRps": tenant_limit} {
      tenant := object.get(data.tenants, input.tenantId, {"enabled": false, "rateLimitRps": 10, "apiKeys": []})
      api_key := object.get(input.headers, "x-velocity-api-key", "")
      not object.get(input.headers, "x-velocity-block", "") == "true"
      can_access := tenant.enabled
      has_valid_key(tenant.apiKeys, api_key)
      tenant_limit := object.get(tenant, "rateLimitRps", 10)
    }

    has_valid_key(keys, key) {
      some i
      keys[i] == key
    }
  data.json: |
    {
      "tenants": {
        "default": {"enabled": true, "rateLimitRps": 120, "apiKeys": ["velocity-dev-key"]},
        "acme": {"enabled": true, "rateLimitRps": 80, "apiKeys": ["acme-prod-key"]}
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: velocity-opa
  namespace: velocity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: velocity-opa
  template:
    metadata:
      labels:
        app: velocity-opa
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: opa
          image: openpolicyagent/opa:0.68.0-static
          args: ["run", "--server", "--addr", ":8181", "/policy/policy.rego", "/policy/data.json"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8181
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 8
            periodSeconds: 10
          volumeMounts:
            - name: policy
              mountPath: /policy
              readOnly: true
      volumes:
        - name: policy
          configMap:
            name: velocity-opa-policy
---
apiVersion: v1
kind: Service
metadata:
  name: velocity-opa
  namespace: velocity
spec:
  selector:
    app: velocity-opa
  ports:
    - port: 8181
      targetPort: 8181
