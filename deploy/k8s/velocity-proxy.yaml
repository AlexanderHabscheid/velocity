apiVersion: apps/v1
kind: Deployment
metadata:
  name: velocity-proxy
  namespace: velocity
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: velocity-proxy
  template:
    metadata:
      labels:
        app: velocity-proxy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: proxy
          image: ghcr.io/ahabscheid/velocity:0.1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          args:
            - proxy
            - --target
            - ws://upstream.default.svc.cluster.local:4000
            - --host
            - 0.0.0.0
            - --port
            - "4100"
            - --listener-engine
            - ws
            - --zstd
            - --zstd-min-bytes
            - "512"
            - --zstd-min-gain-ratio
            - "0.03"
            - --metrics-host
            - 0.0.0.0
            - --metrics-port
            - "9464"
            - --opa-endpoint
            - http://velocity-opa.velocity.svc.cluster.local:8181
            - --opa-path
            - velocity/allow
            - --rate-limit-control-plane-endpoint
            - http://velocity-control-plane.velocity.svc.cluster.local:4200
            - --nats-url
            - nats://velocity-nats.velocity.svc.cluster.local:4222
            - --otlp-http-endpoint
            - http://velocity-otel-collector.velocity.svc.cluster.local:4318
          ports:
            - containerPort: 4100
            - containerPort: 9464
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 4100
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 4100
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: velocity-proxy
  namespace: velocity
spec:
  selector:
    app: velocity-proxy
  ports:
    - name: ws
      port: 4100
      targetPort: 4100
    - name: metrics
      port: 9464
      targetPort: 9464
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: velocity-proxy
  namespace: velocity
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: velocity-proxy
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
