apiVersion: v1
kind: ConfigMap
metadata:
  name: velocity-otel-collector
  namespace: velocity
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024
    exporters:
      logging:
        loglevel: info
    service:
      pipelines:
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [logging]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: velocity-otel-collector
  namespace: velocity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: velocity-otel-collector
  template:
    metadata:
      labels:
        app: velocity-otel-collector
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector:0.105.0
          args: ["--config=/etc/otelcol/config.yaml"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 4318
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 4318
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 4318
            initialDelaySeconds: 8
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
      volumes:
        - name: config
          configMap:
            name: velocity-otel-collector
