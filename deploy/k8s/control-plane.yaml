apiVersion: apps/v1
kind: Deployment
metadata:
  name: velocity-control-plane
  namespace: velocity
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: velocity-control-plane
  template:
    metadata:
      labels:
        app: velocity-control-plane
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: control-plane
          image: ghcr.io/ahabscheid/velocity:0.1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          args:
            [
              "control-plane",
              "--host",
              "0.0.0.0",
              "--port",
              "4200",
              "--store-engine",
              "json",
              "--state-file",
              "/var/lib/velocity/control-plane-state.json",
              "--valkey-url",
              "redis://velocity-valkey.velocity.svc.cluster.local:6379",
              "--nats-url",
              "nats://velocity-nats.velocity.svc.cluster.local:4222"
            ]
          ports:
            - containerPort: 4200
          volumeMounts:
            - name: control-plane-state
              mountPath: /var/lib/velocity
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4200
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4200
            initialDelaySeconds: 8
            periodSeconds: 10
      volumes:
        - name: control-plane-state
          persistentVolumeClaim:
            claimName: velocity-control-plane-state
---
apiVersion: v1
kind: Service
metadata:
  name: velocity-control-plane
  namespace: velocity
spec:
  selector:
    app: velocity-control-plane
  ports:
    - port: 4200
      targetPort: 4200
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: velocity-control-plane-state
  namespace: velocity
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
