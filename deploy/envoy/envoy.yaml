static_resources:
  listeners:
    - name: velocity_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: velocity_hcm
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: velocity
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: velocity_proxy
                            timeout: 0s
                            upgrade_configs:
                              - upgrade_type: websocket
                http_filters:
                  - name: envoy.filters.http.jwt_authn
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                      providers:
                        velocity_jwt:
                          issuer: https://auth.example.com/
                          audiences: ["velocity"]
                          remote_jwks:
                            http_uri:
                              uri: https://auth.example.com/.well-known/jwks.json
                              cluster: jwks_cluster
                              timeout: 2s
                            cache_duration:
                              seconds: 300
                      rules:
                        - match:
                            prefix: "/"
                          requires:
                            provider_name: velocity_jwt
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
    - name: velocity_proxy
      connect_timeout: 2s
      type: strict_dns
      load_assignment:
        cluster_name: velocity_proxy
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: velocity-proxy
                      port_value: 4100
    - name: jwks_cluster
      connect_timeout: 2s
      type: LOGICAL_DNS
      load_assignment:
        cluster_name: jwks_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: auth.example.com
                      port_value: 443
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
