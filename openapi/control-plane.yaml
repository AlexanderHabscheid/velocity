openapi: 3.0.3
info:
  title: Velocity Control Plane API
  version: 0.1.0
servers:
  - url: http://127.0.0.1:4200
paths:
  /healthz:
    get:
      operationId: healthz
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  now:
                    type: string
                    format: date-time
                  storeEngine:
                    type: string
                    enum: [json, sqlite]
                required: [ok, now]
  /v1/runtime/profile:
    get:
      operationId: getRuntimeProfile
      responses:
        '200':
          description: Current runtime profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeProfile'
    put:
      operationId: putRuntimeProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeProfileUpdate'
      responses:
        '200':
          description: Runtime profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeProfile'
  /v1/tenants/{tenantId}/policy:
    get:
      operationId: getTenantPolicy
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tenant policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantPolicy'
    put:
      operationId: putTenantPolicy
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantPolicyUpdate'
      responses:
        '200':
          description: Tenant policy updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantPolicy'
  /v1/tenants/{tenantId}/rate-limit/check:
    post:
      operationId: checkTenantRateLimit
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantRateLimitCheckRequest'
      responses:
        '200':
          description: Rate limit decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantRateLimitCheckResponse'
components:
  schemas:
    TenantPolicy:
      type: object
      properties:
        tenantId:
          type: string
        enabled:
          type: boolean
        rateLimitRps:
          type: integer
          minimum: 1
        updatedAt:
          type: string
          format: date-time
      required: [tenantId, enabled, rateLimitRps, updatedAt]
    TenantPolicyUpdate:
      type: object
      properties:
        enabled:
          type: boolean
        rateLimitRps:
          type: integer
          minimum: 1
    TenantRateLimitCheckRequest:
      type: object
      properties:
        rateLimitRps:
          type: integer
          minimum: 1
    TenantRateLimitCheckResponse:
      type: object
      properties:
        allow:
          type: boolean
        remainingTokens:
          type: number
        updatedAt:
          type: string
          format: date-time
      required: [allow, remainingTokens, updatedAt]
    RuntimeProfile:
      type: object
      properties:
        batchWindowMs:
          type: integer
          minimum: 0
        minBatchWindowMs:
          type: integer
          minimum: 0
        maxBatchWindowMs:
          type: integer
          minimum: 0
        latencyBudgetMs:
          type: integer
          minimum: 1
        batchMaxMessages:
          type: integer
          minimum: 1
        batchMaxBytes:
          type: integer
          minimum: 1
        enableZstd:
          type: boolean
        enableDelta:
          type: boolean
        safeMode:
          type: boolean
        enablePassthroughMerge:
          type: boolean
        updatedAt:
          type: string
          format: date-time
      required:
        [batchWindowMs, minBatchWindowMs, maxBatchWindowMs, latencyBudgetMs, batchMaxMessages, batchMaxBytes, enableZstd, enableDelta, safeMode, enablePassthroughMerge, updatedAt]
    RuntimeProfileUpdate:
      type: object
      properties:
        batchWindowMs:
          type: integer
          minimum: 0
        minBatchWindowMs:
          type: integer
          minimum: 0
        maxBatchWindowMs:
          type: integer
          minimum: 0
        latencyBudgetMs:
          type: integer
          minimum: 1
        batchMaxMessages:
          type: integer
          minimum: 1
        batchMaxBytes:
          type: integer
          minimum: 1
        enableZstd:
          type: boolean
        enableDelta:
          type: boolean
        safeMode:
          type: boolean
        enablePassthroughMerge:
          type: boolean
